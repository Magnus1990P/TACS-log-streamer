# Nginx reverse proxy configuration for OAuth2 Log Streamer
# This configuration:
# - Terminates HTTPS (if certificates are provided)
# - Proxies public endpoints to the FastAPI app
# - BLOCKS /internal* endpoints from public access
# - Handles WebSocket/SSE connections properly
# - Sets security headers

# Main context
user nginx;
worker_processes auto;

# PID file
pid /var/run/nginx.pid;

# Error log
error_log /var/log/nginx/error.log warn;

# Events
events {
    worker_connections 1024;
}

# HTTP context
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_connect_timeout 86400;

    # Buffer settings for SSE/WebSocket
    proxy_buffers 8 32k;
    proxy_buffer_size 64k;

    # Server block for HTTP (redirects to HTTPS if HTTPS is configured)
    server {
        listen 80;
        server_name localhost;

        # If HTTPS certificates are available, redirect to HTTPS
        # If not, serve directly on HTTP
        if ($ssl_certificate) {
            return 301 https://$host$request_uri;
        }

        # Security headers (applies to both HTTP and HTTPS)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # BLOCK /internal* endpoints - these should NEVER be publicly accessible
        # Allow access from the configured internal IP (if set)
        location ~ ^/(internal|admin) {
            allow ${INTERNAL_ALLOWED_IP};
            deny all;
            return 403;
        }

        # Proxy all other requests to FastAPI app
        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files (if not handled by FastAPI)
        location /static/ {
            alias /app/static/;
            expires 30d;
        }
    }

    # HTTPS server block (only active if certificates exist)
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL certificate configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # BLOCK /internal* endpoints - these should NEVER be publicly accessible
        # Allow access from the configured internal IP (if set)
        location ~ ^/(internal|admin) {
            allow ${INTERNAL_ALLOWED_IP};
            deny all;
            return 403;
        }

        # Proxy all other requests to FastAPI app
        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files
        location /static/ {
            alias /app/static/;
            expires 30d;
        }
    }
}
