<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TACS Log Monitor</title>
  <style>
    :root {
      --bg:          #111827;
      --surface:     #1f2937;
      --surface-2:   #273549;
      --border:      #374151;
      --text:        #f3f4f6;
      --text-muted:  #9ca3af;
      --text-dim:    #6b7280;

      --granted:     #34d399;
      --denied:      #f87171;
      --error:       #fb923c;
      --heartbeat:   #60a5fa;
      --other:       #a78bfa;

      --granted-bg:  rgba(52,211,153,0.12);
      --denied-bg:   rgba(248,113,113,0.12);
      --error-bg:    rgba(251,146,60,0.12);
      --heartbeat-bg:rgba(96,165,250,0.10);
      --other-bg:    rgba(167,139,250,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    body { display: flex; flex-direction: column; }

    /* ---- Header ---- */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .logo em { font-style: normal; color: var(--heartbeat); }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }
    .status-badge.connected    { background: rgba(52,211,153,0.1);  border-color: rgba(52,211,153,0.3);  color: var(--granted); }
    .status-badge.disconnected { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--denied); }
    .status-badge.connecting   { background: rgba(251,146,60,0.1);  border-color: rgba(251,146,60,0.3);  color: var(--error); }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: 0.2; } }

    .header-meta {
      margin-left: auto;
      display: flex;
      gap: 24px;
      align-items: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .header-meta strong { color: var(--text); font-weight: 600; }

    #clock { color: var(--text-dim); font-variant-numeric: tabular-nums; }

    /* ---- Auth bar ---- */
    #authBar {
      display: none;
      flex-shrink: 0;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      align-items: center;
      background: rgba(251,146,60,0.08);
      color: var(--error);
      font-size: 0.82rem;
    }
    #authBar.visible { display: flex; }

    .auth-btn {
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .auth-btn:hover { border-color: var(--heartbeat); color: var(--heartbeat); }

    /* ---- Toolbar ---- */
    #toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #filterInput {
      flex: 1;
      max-width: 340px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    #filterInput::placeholder { color: var(--text-dim); }
    #filterInput:focus { border-color: var(--heartbeat); }

    .toolbar-right { margin-left: auto; display: flex; gap: 6px; }

    .btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover { border-color: var(--text-muted); color: var(--text); }
    .btn.active { border-color: var(--error); color: var(--error); }

    /* ---- Log pane ---- */
    #logPane {
      flex: 1;
      overflow-y: auto;
    }

    /* Column layout: time | badge | source | message */
    .log-row {
      display: grid;
      grid-template-columns: 82px 160px 140px 1fr;
      gap: 0 12px;
      padding: 5px 20px;
      border-bottom: 1px solid #1a2232;
      align-items: baseline;
      transition: background 0.1s;
    }
    .log-row:hover { background: var(--surface-2); }
    .log-row.hidden { display: none; }

    .log-ts {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      color: var(--text-dim);
      white-space: nowrap;
      font-size: 0.8rem;
    }

    .log-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge-granted   { color: var(--granted);   background: var(--granted-bg);   border-color: rgba(52,211,153,0.25); }
    .badge-denied    { color: var(--denied);    background: var(--denied-bg);    border-color: rgba(248,113,113,0.25); }
    .badge-error     { color: var(--error);     background: var(--error-bg);     border-color: rgba(251,146,60,0.25); }
    .badge-heartbeat { color: var(--heartbeat); background: var(--heartbeat-bg); border-color: rgba(96,165,250,0.2); }
    .badge-other     { color: var(--other);     background: var(--other-bg);     border-color: rgba(167,139,250,0.2); }

    .log-src {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      color: var(--text-muted);
      font-size: 0.8rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-msg {
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      color: var(--text);
      font-size: 0.82rem;
      word-break: break-word;
    }

    /* Soften message colour for low-importance rows */
    .log-row.type-heartbeat .log-msg { color: var(--text-muted); }
    .log-row.type-other     .log-msg { color: #c9d1d9; }

    /* History separator */
    .history-sep {
      padding: 5px 20px;
      font-size: 0.75rem;
      color: var(--text-dim);
      border-bottom: 1px dashed var(--border);
      letter-spacing: 0.06em;
    }

    /* Empty state */
    #empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-dim);
      line-height: 2;
    }
    #empty .icon { font-size: 2rem; margin-bottom: 8px; }

    /* Scrollbar */
    #logPane::-webkit-scrollbar { width: 5px; }
    #logPane::-webkit-scrollbar-track { background: var(--bg); }
    #logPane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body data-require-auth="{{ 'true' if require_auth else 'false' }}"
      data-is-authenticated="{{ 'true' if is_authenticated else 'false' }}">

<header>
  <div class="logo">TACS &mdash; <em>Log Monitor</em></div>

  <div class="status-badge disconnected" id="statusBadge">
    <div class="dot" id="statusDot"></div>
    <span id="statusLabel">Offline</span>
  </div>

  <div class="header-meta">
    <div>Events &nbsp;<strong id="statTotal">0</strong></div>
    <div>Clients &nbsp;<strong id="statClients">—</strong></div>
    <div id="clock"></div>
  </div>
</header>

<div id="authBar">
  <span>Authentication required to view logs:</span>
  {% for p in providers %}
    <button class="auth-btn" onclick="location.href='/auth/login/{{ p }}'">
      Sign in with {{ p | capitalize }}
    </button>
  {% endfor %}
</div>

<div id="toolbar">
  <input id="filterInput" type="text" placeholder="Filter by source or message..." oninput="applyFilter()" autocomplete="off" spellcheck="false" />
  <div class="toolbar-right">
    <button class="btn" onclick="clearLogs()">Clear</button>
    <button class="btn" id="pauseBtn" onclick="togglePause()">Pause</button>
  </div>
</div>

<div id="logPane">
  <div id="empty">
    <div class="icon">📡</div>
    <div>Connecting to log stream…</div>
  </div>
</div>

<script>
  const REQUIRE_AUTH     = document.body.dataset.requireAuth === 'true';
  const IS_AUTHENTICATED = document.body.dataset.isAuthenticated === 'true';

  let es          = null;
  let paused      = false;
  let totalEvents = 0;
  let autoScroll  = true;
  let filterText  = '';

  const logPane  = document.getElementById('logPane');
  const pauseBtn = document.getElementById('pauseBtn');
  const authBar  = document.getElementById('authBar');

  // --- Clock ---
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  }
  updateClock();
  setInterval(updateClock, 1000);

  // --- Event classification ---
  function classify(level) {
    const l = (level || '').toUpperCase();
    if (l.includes('GRANT'))                    return 'granted';
    if (l.includes('DENY') || l.includes('DENIED')) return 'denied';
    if (l.includes('ERROR') || l.includes('FAULT')) return 'error';
    if (l.includes('HEART') || l.includes('PING'))  return 'heartbeat';
    return 'other';
  }

  const BADGE_LABEL = {
    granted:   'Access Granted',
    denied:    'Access Denied',
    error:     'System Error',
    heartbeat: 'Reader Heartbeat',
    other:     'Other',
  };

  // --- SSE ---
  function connect() {
    if (REQUIRE_AUTH && !IS_AUTHENTICATED) {
      authBar.classList.add('visible');
      setStatus('disconnected', 'Sign in required');
      return;
    }
    setStatus('connecting', 'Connecting…');
    es = new EventSource('/stream');

    es.onopen = () => {
      setStatus('connecting', 'Loading history…');
      removeEmpty();
    };

    es.onmessage = (e) => {
      if (paused) return;
      try { appendLog(JSON.parse(e.data)); } catch (_) {}
    };

    es.addEventListener('ready', () => {
      setStatus('connected', 'Live');
      appendSep('— live —');
    });

    es.onerror = () => setStatus('disconnected', 'Reconnecting…');
  }

  // --- Render ---
  function appendLog(ev) {
    totalEvents++;
    document.getElementById('statTotal').textContent = totalEvents;

    const type = classify(ev.level);
    const ts   = ev.timestamp
      ? new Date(ev.timestamp).toISOString().slice(11, 19)
      : new Date().toISOString().slice(11, 19);

    const row = document.createElement('div');
    row.className = `log-row type-${type}`;
    row.dataset.text = ((ev.source || '') + ' ' + (ev.message || '')).toLowerCase();

    row.innerHTML =
      `<span class="log-ts">${ts}</span>` +
      `<span class="log-badge badge-${type}">${BADGE_LABEL[type]}</span>` +
      `<span class="log-src">${escapeHtml(ev.source || '')}</span>` +
      `<span class="log-msg">${escapeHtml(ev.message || '')}</span>`;

    applyRowVisibility(row);
    logPane.appendChild(row);
    if (autoScroll) logPane.scrollTop = logPane.scrollHeight;
  }

  function appendSep(text) {
    const sep = document.createElement('div');
    sep.className = 'history-sep';
    sep.textContent = text;
    logPane.appendChild(sep);
  }

  function removeEmpty() {
    document.getElementById('empty')?.remove();
  }

  // --- Filter ---
  function applyRowVisibility(row) {
    row.classList.toggle('hidden',
      !!filterText && !row.dataset.text.includes(filterText)
    );
  }

  function applyFilter() {
    filterText = document.getElementById('filterInput').value.toLowerCase();
    document.querySelectorAll('.log-row').forEach(applyRowVisibility);
  }

  // --- Controls ---
  function clearLogs() {
    document.querySelectorAll('.log-row, .history-sep').forEach(el => el.remove());
    totalEvents = 0;
    document.getElementById('statTotal').textContent = '0';
  }

  function togglePause() {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    pauseBtn.classList.toggle('active', paused);
  }

  // --- Status ---
  function setStatus(state, label) {
    const badge = document.getElementById('statusBadge');
    const dot   = document.getElementById('statusDot');
    badge.className = `status-badge ${state}`;
    dot.className   = `dot${state === 'connecting' ? ' pulse' : ''}`;
    document.getElementById('statusLabel').textContent = label;
  }

  // --- Auto-scroll ---
  logPane.addEventListener('scroll', () => {
    autoScroll = logPane.scrollTop + logPane.clientHeight >= logPane.scrollHeight - 40;
  });

  // --- Stats poll ---
  async function pollStats() {
    try {
      const r = await fetch('/health');
      if (r.ok) {
        const d = await r.json();
        document.getElementById('statClients').textContent = d.connections ?? '—';
      }
    } catch (_) {}
  }
  setInterval(pollStats, 5000);
  pollStats();

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  connect();
</script>
</body>
</html>
