<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Streamer - OAuth2 Demo</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; 
            background: #f5f5f5; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6; 
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }
        
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 30px; 
            text-align: center; 
        }
        
        .header h1 { 
            font-size: 2em; 
            margin-bottom: 10px; 
        }
        
        .header p { 
            opacity: 0.9; 
        }
        
        .content { 
            padding: 30px; 
        }
        
        .status-bar { 
            background: #f8f9fa; 
            padding: 15px 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 2px solid #e9ecef; 
        }
        
        .status-bar.connected { 
            background: #d4edda; 
            border-color: #c3e6cb; 
        }
        
        .status-bar.disconnected { 
            background: #f8d7da; 
            border-color: #f5c6cb; 
        }
        
        .status-text { 
            font-weight: 600; 
            font-size: 1.1em; 
        }
        
        .user-info { 
            font-size: 0.9em; 
            color: #6c757d; 
        }
        
        .actions { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
        }
        
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        button.primary { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
        }
        
        button.primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); 
        }
        
        button.secondary { 
            background: #6c757d; 
            color: white; 
        }
        
        button.secondary:hover { 
            background: #5a6268; 
        }
        
        button:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        
        .log-container { 
            border: 1px solid #e9ecef; 
            padding: 0; 
            margin-top: 20px; 
            max-height: 500px; 
            overflow-y: auto; 
            background: #f8f9fa; 
            border-radius: 8px; 
        }
        
        .log-header { 
            padding: 15px 20px; 
            background: #e9ecef; 
            border-bottom: 1px solid #dee2e6; 
            font-weight: 600; 
            color: #495057; 
        }
        
        .log-entry { 
            padding: 12px 20px; 
            border-bottom: 1px solid #e9ecef; 
            display: flex; 
            gap: 12px; 
            align-items: flex-start; 
        }
        
        .log-entry:last-child { 
            border-bottom: none; 
        }
        
        .log-timestamp { 
            font-size: 0.85em; 
            color: #6c757d; 
            white-space: nowrap; 
            min-width: 180px; 
        }
        
        .log-source { 
            font-weight: 600; 
            min-width: 120px; 
            color: #495057; 
        }
        
        .log-message { 
            flex: 1; 
            color: #212529; 
        }
        
        .log-level { 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 0.75em; 
            font-weight: 700; 
            text-transform: uppercase; 
        }
        
        .log-info { background: #d1ecf1; color: #0c5460; }
        .log-warning { background: #fff3cd; color: #856404; }
        .log-error { background: #f8d7da; color: #721c24; }
        .log-debug { background: #e2e3e5; color: #383d41; }
        .log-critical { background: #721c24; color: white; }
        
        .empty-state { 
            padding: 40px; 
            text-align: center; 
            color: #6c757d; 
        }
        
        .provider-buttons { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 20px; 
        }
        
        .provider-btn { 
            padding: 10px 16px; 
            border: 1px solid #dee2e6; 
            background: white; 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: all 0.2s ease; 
        }
        
        .provider-btn:hover { 
            border-color: #667eea; 
            background: #f8f9fa; 
        }
        
        .provider-btn img { 
            width: 20px; 
            height: 20px; 
        }
        
        .stats { 
            display: flex; 
            gap: 20px; 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid #e9ecef; 
        }
        
        .stat { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .stat-value { 
            font-weight: 600; 
            color: #667eea; 
        }
        
        @keyframes pulse { 
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .pulse { 
            animation: pulse 2s infinite; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 Log Streamer</h1>
            <p>Real-time log streaming with OAuth2 authentication</p>
        </div>
        
        <div class="content">
            <!-- Status Bar -->
            <div id="statusBar" class="status-bar disconnected">
                <div class="status-text" id="statusText">Not connected</div>
                <div class="user-info" id="userInfo">Sign in to start streaming</div>
            </div>
            
            <!-- OAuth Provider Buttons -->
            <div class="provider-buttons" id="providerButtons">
                <button class="provider-btn" onclick="authenticate('microsoft')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft" style="width: 20px; height: 20px;">
                    <span>Sign in with Microsoft</span>
                </button>
                <button class="provider-btn" onclick="authenticate('kanidm')">
                    <img src="https://kanidm.com/img/logo.svg" alt="Kanidm" style="width: 20px; height: 20px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ctext y=%2250%22 font-size=%2240%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EK%3C/text%3E%3C/svg%3E'">
                    <span>Sign in with Kanidm</span>
                </button>
            </div>
            
            <!-- Action Buttons -->
            <div class="actions">
                <button class="primary" onclick="authenticate()" id="connectBtn">
                    <span>🔗</span> Connect with Mock Token
                </button>
                <button class="secondary" onclick="disconnect()" id="disconnectBtn" disabled>
                    <span>✕</span> Disconnect
                </button>
                <button class="secondary" onclick="clearLogs()">
                    <span>🗑️</span> Clear Logs
                </button>
                <button class="primary" onclick="sendTestLog()">
                    <span>🧪</span> Send Test Log
                </button>
            </div>
            
            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <span>📊 Messages:</span>
                    <span class="stat-value" id="messageCount">0</span>
                </div>
                <div class="stat">
                    <span>⏱️ Uptime:</span>
                    <span class="stat-value" id="uptime">0s</span>
                </div>
                <div class="stat">
                    <span>🔄 Status:</span>
                    <span class="stat-value" id="connectionStatus">Disconnected</span>
                </div>
            </div>
            
            <!-- Log Container -->
            <div class="log-container">
                <div class="log-header">📝 Real-time Log Stream</div>
                <div id="logContainer" class="log-content">
                    <div class="empty-state pulse">
                        <p>No logs yet.</p>
                        <p style="opacity: 0.7; margin-top: 5px;">Authenticate to start receiving real-time logs.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // State management
        let eventSource = null;
        let accessToken = null;
        let userId = null;
        let messageCount = 0;
        let startTime = null;
        let reconnectAttempts = 0;
        
        // DOM elements
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const userInfo = document.getElementById('userInfo');
        const logContainer = document.getElementById('logContainer');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const messageCountEl = document.getElementById('messageCount');
        const uptimeEl = document.getElementById('uptime');
        const connectionStatusEl = document.getElementById('connectionStatus');
        const providerButtons = document.getElementById('providerButtons');
        
        // Format timestamp
        function formatTimestamp(timestamp) {
            if (!timestamp) return new Date().toLocaleTimeString();
            
            const date = new Date(timestamp);
            return date.toLocaleTimeString([], { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: false 
            });
        }
        
        // Get log level class
        function getLogLevelClass(level) {
            const levelMap = {
                'DEBUG': 'debug',
                'INFO': 'info',
                'WARNING': 'warning',
                'ERROR': 'error',
                'CRITICAL': 'critical'
            };
            return levelMap[level?.toUpperCase()] || 'info';
        }
        
        // Add log entry to UI
        function addLog(source, message, level, timestamp, tags = []) {
            messageCount++;
            messageCountEl.textContent = messageCount;
            
            // Remove empty state
            const emptyState = logContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            
            const levelClass = getLogLevelClass(level);
            
            logEntry.innerHTML = `
                <span class="log-timestamp">${formatTimestamp(timestamp)}</span>
                <span class="log-source">${source || 'unknown'}</span>
                <span class="log-level log-${levelClass}">${level || 'INFO'}</span>
                <span class="log-message">${message}</span>
            `;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // Connect to SSE stream
        function connectToStream() {
            if (eventSource) {
                eventSource.close();
            }
            
            if (!accessToken) {
                console.error('No access token available');
                return;
            }
            
            // Connect to the SSE endpoint with the access token
            eventSource = new EventSource(`/public/stream?token=${encodeURIComponent(accessToken)}`);
            
            eventSource.onopen = function() {
                console.log('✅ Connection opened');
                addLog('System', 'Connected to log stream', 'INFO', new Date().toISOString());
                updateStatus('Connected', 'connected');
                reconnectAttempts = 0;
                startUptime();
            };
            
            eventSource.onmessage = function(event) {
                try {
                    const logData = JSON.parse(event.data);
                    
                    // Skip keep-alive messages
                    if (logData.keepalive) {
                        return;
                    }
                    
                    addLog(
                        logData.source || 'unknown',
                        logData.message,
                        logData.level || 'INFO',
                        logData.timestamp,
                        logData.tags || []
                    );
                } catch (e) {
                    console.error('Error parsing log:', e);
                    addLog('System', 'Error parsing log: ' + event.data, 'ERROR', new Date().toISOString());
                }
            };
            
            eventSource.onerror = function(error) {
                console.error('❌ EventSource error:', error);
                addLog('System', 'Connection error: ' + JSON.stringify(error), 'ERROR', new Date().toISOString());
                updateStatus('Connection lost', 'disconnected');
                
                // Try to reconnect after delay
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000); // Max 30s
                reconnectAttempts++;
                
                setTimeout(() => {
                    if (accessToken) {
                        connectToStream();
                    }
                }, delay);
            };
        }
        
        // Update connection status
        function updateStatus(text, state) {
            statusText.textContent = text;
            statusBar.className = `status-bar ${state}`;
            connectionStatusEl.textContent = text;
            
            if (state === 'connected') {
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            } else {
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }
        
        // Start uptime counter
        function startUptime() {
            if (!startTime) {
                startTime = Date.now();
            }
            
            function update() {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const seconds = elapsed % 60;
                const minutes = Math.floor(elapsed / 60) % 60;
                const hours = Math.floor(elapsed / 3600);
                
                let uptimeStr = '';
                if (hours > 0) uptimeStr += `${hours}h `;
                if (minutes > 0 || hours > 0) uptimeStr += `${minutes}m `;
                uptimeStr += `${seconds}s`;
                
                uptimeEl.textContent = uptimeStr;
            }
            
            update();
            setInterval(update, 1000);
        }
        
        // Authenticate with OAuth2 provider or mock token (for development)
        async function authenticate(provider = null) {
            if (provider === 'microsoft' || provider === 'kanidm') {
                // Real OAuth2 flow - redirect to provider
                console.log(`Authenticating with ${provider}...`);
                addLog('Auth', `Initiating ${provider} authentication`, 'INFO', new Date().toISOString());
                
                // Redirect to OAuth2 login endpoint
                window.location.href = `/auth/login/${provider}`;
                return;
            } else {
                // Mock token for development (when no provider specified)
                console.log('Using mock authentication for development');
                addLog('Auth', 'Using mock authentication', 'WARNING', new Date().toISOString());
                
                accessToken = 'mock_dev_token_' + Math.random().toString(36).substr(2, 16);
                userId = `user_dev_${Math.floor(Math.random() * 10000)}`;
            }
            
            userInfo.textContent = `Signed in as: ${userId}`;
            updateStatus('Connecting...', 'connected');
            connectToStream();
        }
        
        // Disconnect from stream
        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            accessToken = null;
            userId = null;
            startTime = null;
            messageCount = 0;
            
            updateStatus('Not connected', 'disconnected');
            userInfo.textContent = 'Sign in to start streaming';
            messageCountEl.textContent = '0';
            uptimeEl.textContent = '0s';
            
            addLog('System', 'Disconnected', 'INFO', new Date().toISOString());
        }
        
        // Clear all logs
        function clearLogs() {
            logContainer.innerHTML = `
                <div class="empty-state pulse">
                    <p>No logs yet.</p>
                    <p style="opacity: 0.7; margin-top: 5px;">Authenticate to start receiving real-time logs.</p>
                </div>
            `;
            messageCount = 0;
            messageCountEl.textContent = '0';
            addLog('System', 'Logs cleared', 'INFO', new Date().toISOString());
        }
        
        // Send a test log (via internal endpoint)
        async function sendTestLog() {
            const levels = ['INFO', 'WARNING', 'ERROR', 'DEBUG', 'CRITICAL'];
            const randomLevel = levels[Math.floor(Math.random() * levels.length)];
            const messages = [
                'System initialization complete',
                'User login detected',
                'Database connection established',
                'API request processed',
                'Error in module X',
                'Warning: High memory usage',
                'Debug information collected',
                'Critical: Service unavailable'
            ];
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];
            
            try {
                const response = await fetch('/internal', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        level: randomLevel,
                        message: randomMessage,
                        source: 'Test Client',
                        tags: ['test', 'demo']
                    })
                });
                
                if (response.ok) {
                    addLog('Test', `Sent test log: ${randomMessage}`, 'INFO', new Date().toISOString());
                } else {
                    addLog('Test', 'Failed to send test log', 'ERROR', new Date().toISOString());
                }
            } catch (error) {
                addLog('Test', `Error sending test log: ${error.message}`, 'ERROR', new Date().toISOString());
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('Not connected', 'disconnected');
        });
        
        // Auto-connect on page load (for demo purposes - uncomment to enable)
        // window.onload = function() {
        //     setTimeout(() => authenticate(), 2000);
        // };
    </script>
</body>
</html>
