apiVersion: v1
kind: ConfigMap
metadata:
  name: tacs-log-streamer-config
  labels:
    app: tacs-log-streamer
data:
  # Application settings
  PORT: "8000"
  HOST: "0.0.0.0"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  INTERNAL_API_KEY_HEADER: "X-Internal-API-Key"
  
  # Microsoft Entra ID
  MICROSOFT_JWKS_URI: "https://login.microsoftonline.com/common/discovery/v2.0/keys"
  MICROSOFT_ISSUER: "https://login.microsoftonline.com/{tenantid}/v2.0"
  
  # Kanidm OIDC
  KANIDM_AUTHORIZE_URL: "https://kanidm.tailb89add.ts.net/oauth2/authorize"
  KANIDM_TOKEN_URL: "https://kanidm.tailb89add.ts.net/oauth2/token"
  KANIDM_JWKS_URI: "https://kanidm.tailb89add.ts.net/oauth2/jwks"
  KANIDM_ISSUER: "https://kanidm.tailb89add.ts.net"
