apiVersion: v1
kind: ConfigMap
metadata:
  name: tacs-log-streamer
  namespace: tacs
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  CACHE_MAX_EVENTS: "200"
  REQUIRE_AUTH: "true"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_MINUTES: "60"
  INTERNAL_API_KEY_HEADER: "X-Internal-API-Key"
  # Set to a URL or /static/logo.svg (mount the file via a ConfigMap volume)
  BRAND_LOGO_URL: "/static/logo.svg"
