apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tacs-log-streamer-ingress
  labels:
    app: tacs-log-streamer
  annotations:
    # Use appropriate ingress class based on your cluster
    # kubernetes.io/ingress.class: "nginx"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # For OAuth callback URLs to work, you may need sticky sessions
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "tacs-session"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  ingressClassName: nginx
  rules:
  - host: logs.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tacs-log-streamer
            port:
              number: 80
  # Uncomment for HTTPS
  # tls:
  # - hosts:
  #   - logs.yourdomain.com
  #   secretName: tacs-log-streamer-tls
