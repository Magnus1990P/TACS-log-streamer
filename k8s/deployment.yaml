apiVersion: apps/v1
kind: Deployment
metadata:
  name: tacs-log-streamer
  labels:
    app: tacs-log-streamer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tacs-log-streamer
  template:
    metadata:
      labels:
        app: tacs-log-streamer
    spec:
      containers:
      - name: tacs-log-streamer
        image: ghcr.io/magnu/tacs-log-streamer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: tacs-log-streamer-config
        - secretRef:
            name: tacs-log-streamer-secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
