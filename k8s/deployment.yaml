apiVersion: apps/v1
kind: Deployment
metadata:
  name: tacs-log-streamer
  namespace: tacs
  labels:
    app: tacs-log-streamer
spec:
  # SSE connections are held in-process — do not scale beyond 1 without
  # adding a shared message bus (Redis Pub/Sub, etc.) first.
  replicas: 1
  selector:
    matchLabels:
      app: tacs-log-streamer
  template:
    metadata:
      labels:
        app: tacs-log-streamer
    spec:
      containers:
        - name: tacs-log-streamer
          image: ghcr.io/magnus1990p/tacs-log-streamer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tacs-log-streamer
            - secretRef:
                name: tacs-log-streamer
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: logo
              mountPath: /app/app/static/logo.svg
              subPath: logo.svg
              readOnly: true
      volumes:
        - name: logo
          configMap:
            name: tacs-log-streamer-logo
      # Uncomment if the GHCR package is private:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
